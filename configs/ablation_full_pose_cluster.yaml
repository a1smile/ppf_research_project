# 全增强加姿态聚类配置。
# 该配置启用 RS-MRQ、Robust Vote、KDE 和 Pose Clustering。
# 当前参数假设点云单位为毫米。

# 随机种子，用于保证实验可复现。
seed: 0
# 体素下采样尺寸，用于控制点云密度。
sampling_leaf: 15.0
# 法向估计时使用的近邻点数量。
normal_k: 5
# PPF 角度离散步长，单位为度。
angle_step_deg: 12.0
# 场景参考点采样步长。
scene_ref_sampling_rate: 20

# 由于当前点云单位为毫米，这里的阈值使用毫米量级。
# 原始 cluster_poses 使用的平移阈值。
pos_thresh: 20.0
# 原始 cluster_poses 使用的旋转阈值，单位为度。
rot_thresh_deg: 20.0

# 每次实验重复运行次数。
registration_runs: 1
# 是否在运行结束后进行可视化。
visualize: false
# 距离步长相对于 sampling_leaf 的比例。
distance_step_ratio: 0.6

# ---------- Adaptive Downsampling ----------
# 是否启用自适应下采样。
adaptive_downsample: true
# 自适应下采样作用对象，这里只对场景点云生效。
adaptive_downsample_apply_to: scene

# 自适应下采样细节参数。
adaptive_downsample_cfg:
  # 点数不超过该阈值时不做下采样。
  no_downsample_thresh: 450
  # 中等规模样本阈值。
  mid_thresh: 1500
  # 大规模样本阈值。
  large_thresh: 3000
  # 中等规模目标点数。
  target_mid: 500
  # 大规模目标点数。
  target_large: 450
  # 超大规模目标点数。
  target_xlarge: 400
  # 搜索合适 voxel 尺寸时的迭代步数。
  search_steps: 12
  # voxel 搜索下界。
  voxel_min: 1.0e-3
  # voxel 搜索上界比例，实际与包围盒对角线相乘使用。
  voxel_max_scale: 0.20

# 三个增强模块都启用。
# 是否启用 RS-MRQ 多分辨率哈希检索。
enable_rsmrq: true
# 是否启用鲁棒投票。
enable_robust_vote: true
# 是否启用 KDE 角度精修。
enable_kde_refine: true

# RS-MRQ 哈希相关配置。
rsmrq:
  # 多分辨率层数。
  L: 2
  # 每层使用的哈希表数量。
  T_tables: 4
  # 每一层的离散窗口参数。
  w_levels:
    - [0.20943951, 0.20943951, 0.20943951, 3.0]
    - [0.41887902, 0.41887902, 0.41887902, 6.0]
  # 使用 count 合并，保留重复候选次数。
  merge_mode: count
  # RS-MRQ 内部随机种子。
  seed: 0

# 鲁棒投票参数配置。
robust_vote:
  # 鲁棒核函数类型。
  kernel: gaussian
  # 核函数尺度参数。
  sigma: 0.6
  # 截断阈值或鲁棒控制参数。
  tau: 1.0
  # 附加权重缩放参数。
  B: 1.0
  # 每个桶中保留的 top-m 候选数。
  top_m_per_bucket: 50
  # 是否对特征做归一化。
  normalize_feature: true

# KDE 与均值漂移精修参数。
kde_refine:
  # 是否使用角度嵌入表示。
  use_angle_embedding: true
  # 精修时保留的 top-k 候选 bin 数量。
  top_k: 3
  # KDE 带宽参数。
  bandwidth_h: 0.35
  # 最大迭代次数。
  max_iter: 50
  # 收敛容差。
  tol: 1.0e-4
  refine_top_pose_k: 10

# ICP 后处理参数。
icp_refine:
  # 是否启用 ICP 精修。
  enable: false
  # ICP 最大迭代次数。
  max_iter: 30
  # ICP 距离阈值。
  distance_threshold: 5.0

# BOP 标注平移尺度参数。
bop_gt:
  # 平移缩放系数，通常毫米单位取 1.0。
  t_scale: 1.0

# 姿态聚类参数。
pose_clustering:
  # 在该配置中显式启用姿态聚类。
  enable: true
  # 姿态聚类的平移阈值，单位与点云一致。
  pos_thresh: 20.0
  # 姿态聚类的旋转阈值，单位为度。
  rot_thresh_deg: 20.0
  # 最小簇大小。
  min_cluster_size: 1
  # 是否按得分从高到低优先合并。
  merge_by_score: true

# 输出目录配置。
output:
  # 实验输出根目录。
  root: experiments
  # 结果文件输出目录。
  results_dir: experiments/results
  # 日志输出目录。
  logs_dir: experiments/logs
  # 表格输出目录。
  tables_dir: experiments/tables
  # 图像输出目录。
  figures_dir: experiments/figures
