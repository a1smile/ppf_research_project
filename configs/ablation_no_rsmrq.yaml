# 中文说明：该配置启用 RobustVote 和 KDE，关闭 RS-MRQ。
# +RobustVote +KDE only (RS-MRQ off)
# 随机种子，用于控制实验复现性。
seed: 0
# 体素下采样的叶子尺寸，用于降低点云密度。
sampling_leaf: 15.0
# 法向量估计时使用的邻域点数量。
normal_k: 5
# 角度离散步长，单位为度。
angle_step_deg: 12.0
# 场景参考点的采样步长或采样率控制参数。
scene_ref_sampling_rate: 20
# 位置误差阈值，用于候选匹配筛选。
pos_thresh: 0.005
# 旋转误差阈值，单位为度。
rot_thresh_deg: 30.0
# 每次配准任务重复执行的次数。
registration_runs: 1
# 是否在运行结束后进行可视化显示。
visualize: false
# 距离步长相对 sampling_leaf 的比例系数。
distance_step_ratio: 0.6

# 是否启用 RS-MRQ 增强模块。
enable_rsmrq: false
# 是否启用鲁棒投票增强模块。
enable_robust_vote: true
# 是否启用 KDE 精化增强模块。
enable_kde_refine: true

# RS-MRQ 相关配置分组。
rsmrq:
  # 哈希层数或多分辨率层级数。
  L: 2
  # 每层使用的哈希表数量。
  T_tables: 4
  # 不同层级下的离散窗口参数，通常对应三个角度维度和一个距离维度。
  w_levels:
    # 第一层的角度和距离窗口设置。
    - [0.20943951, 0.20943951, 0.20943951, 3.0]
    # 第二层的角度和距离窗口设置。
    - [0.41887902, 0.41887902, 0.41887902, 6.0]
  # 多表结果的合并方式。
  merge_mode: union
  # RS-MRQ 模块内部使用的随机种子。
  seed: 0

# 鲁棒投票模块相关配置。
robust_vote:
  # 核函数类型。
  kernel: gaussian
  # 核函数或残差分布的尺度参数。
  sigma: 0.6
  # 截断或鲁棒阈值参数。
  tau: 1.0
  # 额外的缩放或权重控制参数。
  B: 1.0
  # 每个桶中保留的前若干个候选数。
  top_m_per_bucket: 50
  # 是否对特征进行归一化后再参与投票。
  normalize_feature: true

# KDE 精化模块相关配置。
kde_refine:
  # 是否使用角度嵌入表示。
  use_angle_embedding: true
  # 精化阶段保留的 top-k 候选数量。
  top_k: 3
  # KDE 带宽参数。
  bandwidth_h: 0.35
  # 最大迭代次数。
  max_iter: 50
  # 迭代收敛容差。
  tol: 1.0e-4

# ICP 精化模块相关配置。
icp_refine:
  # 是否启用 ICP 精化。
  enable: false
  # ICP 最大迭代次数。
  max_iter: 30
  # ICP 匹配距离阈值。
  distance_threshold: 5.0

# 输出路径相关配置。
output:
  # 实验输出根目录。
  root: experiments
  # 结果文件输出目录。
  results_dir: experiments/results
  # 日志文件输出目录。
  logs_dir: experiments/logs
  # 表格文件输出目录。
  tables_dir: experiments/tables
  # 图像文件输出目录。
  figures_dir: experiments/figures
