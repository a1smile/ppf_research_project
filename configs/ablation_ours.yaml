# 无 KDE + 非学习式 Pose Selection + Top-K Refine + Mode Clustering
# 该配置启用：
# 1) RS-MRQ
# 2) Robust Vote
# 3) Pose Selection
# 4) SE(3) Mode Clustering
# 关闭 KDE，用于验证新框架在无 KDE 条件下的真实收益。

# 随机种子，用于保证实验可复现
seed: 0
# 体素下采样叶子尺寸
sampling_leaf: 15.0
# 法向量估计时的近邻点数量
normal_k: 5
# PPF 特征角度离散步长，单位为度
angle_step_deg: 12.0
# 场景参考点采样率，数值越大采样越稀疏
scene_ref_sampling_rate: 20
# 位移匹配或聚类阈值
pos_thresh: 20.0
# 旋转匹配或聚类阈值，单位为度
rot_thresh_deg: 20.0
# 单个样本执行配准的重复次数
registration_runs: 1
# 是否可视化中间或最终结果
visualize: false
# 距离离散步长相对比例
distance_step_ratio: 0.6

# ---------- Adaptive Downsampling ----------
# 是否启用自适应下采样
adaptive_downsample: true
# 指定自适应下采样作用对象，这里仅作用于场景点云
adaptive_downsample_apply_to: scene

adaptive_downsample_cfg:
  # 点数低于该阈值时不执行下采样
  no_downsample_thresh: 450
  # 中等规模点云阈值
  mid_thresh: 1500
  # 大规模点云阈值
  large_thresh: 3000
  # 中等规模点云目标点数
  target_mid: 500
  # 大规模点云目标点数
  target_large: 450
  # 超大规模点云目标点数
  target_xlarge: 400
  # 搜索合适体素大小时的最大步数
  search_steps: 12
  # 体素大小下界
  voxel_min: 1.0e-3
  # 体素大小上界相对尺度
  voxel_max_scale: 0.20

# ---------- Enhancement switches ----------
# 是否启用 RS-MRQ 检索增强
enable_rsmrq: true
# 是否启用稳健投票
enable_robust_vote: true
# 是否启用 KDE 精修；本配置中关闭
enable_kde_refine: false

# ---------- RS-MRQ ----------
rsmrq:
  # 多分辨率层数
  L: 2
  # 哈希表数量
  T_tables: 4
  # 各层权重配置，前三项为角度相关权重，最后一项为距离相关权重
  w_levels:
    - [0.20943951, 0.20943951, 0.20943951, 3.0]
    - [0.41887902, 0.41887902, 0.41887902, 6.0]
  # 多表结果合并方式
  merge_mode: count
  # 模块内部随机种子
  seed: 0

# ---------- Robust Voting ----------
robust_vote:
  # 核函数类型
  kernel: gaussian
  # 高斯核尺度参数
  sigma: 0.6
  # 稳健投票阈值参数
  tau: 1.0
  # 投票强度缩放系数
  B: 1.0
  # 每个桶保留的候选上限
  top_m_per_bucket: 50
  # 是否对特征做归一化
  normalize_feature: true

# ---------- KDE + Mean-Shift Refinement ----------
# 当前实验关闭 KDE，但参数保留，便于切换。
kde_refine:
  # 是否使用角度嵌入表示姿态
  use_angle_embedding: true
  # 进入 KDE 精修的前 K 个候选
  top_k: 3
  # KDE 或 Mean-Shift 带宽参数
  bandwidth_h: 0.35
  # 最大迭代次数
  max_iter: 15
  # 收敛阈值
  tol: 1.0e-3
  # 最终参与姿态精修的候选数量
  refine_top_pose_k: 1

# ---------- Optional ICP refinement ----------
icp_refine:
  # 是否启用 ICP 精修
  enable: false
  # ICP 最大迭代次数
  max_iter: 30
  # ICP 最大对应距离阈值
  distance_threshold: 5.0

# ---------- BOP Ground Truth ----------
bop_gt:
  # 平移缩放系数，1.0 通常表示毫米制
  t_scale: 1.0

symmetry:
#  8:
#    axis: z
#    order: 2
  10:
    axis: z
    order: 2

# ---------- Non-learning Pose Selection ----------
pose_selection:
  # 是否启用非学习式姿态筛选
  enable: true
  # 基于投票分数预先保留的候选数量
  pre_top_m_by_vote: 60
  # 进入综合打分阶段的候选 top-k
  candidate_top_k: 7
  # 进入轻量精修阶段的候选 top-k
  refine_top_k: 3
  # 内点判定半径
  inlier_radius: 8.0
  # 最大对应点距离
  max_correspondence_distance: 15.0
  # 残差评分尺度参数
  residual_sigma: 6.0
  # 覆盖率统计网格大小
  coverage_grid_size: 4
  # 法向一致性是否使用绝对点积
  normal_use_abs_dot: false
  # 若精修后更差，是否保留原始姿态
  keep_original_if_refine_worse: true
  weights:
    # 投票分数权重
    vote: 0.15
    # 内点得分权重
    inlier: 0.35
    # 覆盖率得分权重
    coverage: 0.25
    # 法向一致性权重
    normal: 0.15
    # 残差得分权重
    residual: 0.10
  light_refine:
    # 是否启用轻量级精修
    enable: true
    # 轻量精修最大迭代次数
    max_iter: 5
    # 轻量精修距离阈值
    distance_threshold: 8.0

# ---------- Pose Mode Clustering ----------
pose_clustering:
  # 是否启用姿态模态聚类
  enable: true
  # 聚类时的平移阈值
  pos_thresh: 20.0
  # 聚类时的旋转阈值，单位为度
  rot_thresh_deg: 18.0
  # 最小簇大小
  min_cluster_size: 1
  # 是否按分数进行簇合并或选择
  merge_by_score: true
  score_weights:
    # 簇大小权重
    size: 0.60
    # 簇平均分权重
    mean: 0.25
    # 簇最高分权重
    max: 0.15

# ---------- Output folders ----------
output:
  # 实验输出根目录
  root: experiments
  # 结果文件目录
  results_dir: experiments/results
  # 日志目录
  logs_dir: experiments/logs
  # 表格输出目录
  tables_dir: experiments/tables
  # 图像输出目录
  figures_dir: experiments/figures
