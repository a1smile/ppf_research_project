# 默认配置。
# 该配置以基线 PPF 为主，默认关闭 RS-MRQ、Robust Vote、KDE 和 Pose Clustering。

# 随机种子，用于保证实验可复现。
seed: 0

# ---------- Baseline PPF parameters ----------
# 体素下采样尺寸，用于降低点云密度。
sampling_leaf: 15.0
# 法向估计时使用的近邻点数量。
normal_k: 5
# 角度离散步长，单位为度。
angle_step_deg: 12.0
# 场景参考点采样步长。
scene_ref_sampling_rate: 20
# 原始姿态聚类使用的平移阈值。
pos_thresh: 0.005
# 原始姿态聚类使用的旋转阈值，单位为度。
rot_thresh_deg: 30.0
# 每次配准任务重复执行次数。
registration_runs: 1
# 是否在运行结束后可视化结果。
visualize: false
# 距离步长比例，实际 distance_step 由代码计算为 0.6 * sampling_leaf。
distance_step_ratio: 0.6

# ---------- Adaptive Downsampling ----------
# 是否启用自适应下采样。
adaptive_downsample: true
# 自适应下采样作用对象。
# 可选值：
# - scene: 只对场景点云自适应下采样
# - model: 只对模型点云自适应下采样
# - both: 同时对模型和场景点云自适应下采样
adaptive_downsample_apply_to: scene

# 自适应下采样详细参数。
adaptive_downsample_cfg:
  # 点数不超过该阈值时不做下采样。
  no_downsample_thresh: 450
  # 中等规模样本阈值。
  mid_thresh: 1500
  # 大规模样本阈值。
  large_thresh: 3000
  # 中等规模目标点数。
  target_mid: 500
  # 大规模目标点数。
  target_large: 450
  # 超大规模目标点数。
  target_xlarge: 400
  # 二分搜索步数。
  search_steps: 12
  # voxel 搜索下界。
  voxel_min: 1.0e-3
  # voxel 搜索上界比例，实际为 bbox_diag * voxel_max_scale。
  voxel_max_scale: 0.20

# ---------- Enhancement switches ----------
# 是否启用 RS-MRQ。
enable_rsmrq: false
# 是否启用鲁棒投票。
enable_robust_vote: false
# 是否启用 KDE 精修。
enable_kde_refine: false

# ---------- RS-MRQ Hashing ----------
rsmrq:
  # 多分辨率层数。
  L: 2
  # 每层使用的哈希表数量。
  T_tables: 4
  # 每层的离散窗口大小。
  w_levels:
    - [0.20943951, 0.20943951, 0.20943951, 3.0]
    - [0.41887902, 0.41887902, 0.41887902, 6.0]
  # 多表结果合并方式，可选 union 或 count。
  merge_mode: union
  # RS-MRQ 内部随机种子。
  seed: 0

# ---------- Robust Voting ----------
robust_vote:
  # 鲁棒核函数类型。
  kernel: gaussian
  # 核函数尺度参数。
  sigma: 0.6
  # 截断阈值或鲁棒控制参数。
  tau: 1.0
  # 额外权重缩放参数。
  B: 1.0
  # 每个桶中保留的 top-m 候选数量。
  top_m_per_bucket: 50
  # 是否对特征做归一化。
  normalize_feature: true

# ---------- KDE + Mean-Shift Refinement ----------
kde_refine:
  # 是否使用角度嵌入表示。
  use_angle_embedding: true
  # 精修时保留的 top-k bin 数量。
  top_k: 3
  # KDE 带宽参数。
  bandwidth_h: 0.35
  # 最大迭代次数。
  max_iter: 50
  # 收敛容差。
  tol: 1.0e-4
  refine_top_pose_k: 10

# ---------- Optional ICP refinement ----------
icp_refine:
  # 是否启用 ICP 精修。
  enable: false
  # ICP 最大迭代次数。
  max_iter: 30
  # ICP 配准距离阈值。
  distance_threshold: 5.0

# ---------- BOP Ground Truth ----------
bop_gt:
  # 平移缩放系数。
  # 若点云单位为毫米，则使用 1.0；
  # 若点云单位为米，则通常使用 0.001。
  t_scale: 1.0

# ---------- Pose Clustering ----------
pose_clustering:
  # 默认关闭，避免改变基线定义。
  enable: false
  # 姿态聚类的平移阈值，单位与点云一致。
  pos_thresh: 20.0
  # 姿态聚类的旋转阈值，单位为度。
  rot_thresh_deg: 20.0
  # 最小簇大小。
  min_cluster_size: 1
  # 是否按 score 从高到低优先合并。
  merge_by_score: true

# ---------- Output folders ----------
output:
  # 实验输出根目录。
  root: experiments
  # 结果文件输出目录。
  results_dir: experiments/results
  # 日志输出目录。
  logs_dir: experiments/logs
  # 表格输出目录。
  tables_dir: experiments/tables
  # 图像输出目录。
  figures_dir: experiments/figures
