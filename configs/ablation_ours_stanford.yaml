enable_rsmrq: true
enable_robust_vote: true
enable_kde_refine: false
seed: 0

# 关键：从 15.0 改到 Stanford 这类小尺度可用范围
sampling_leaf: 0.004
normal_k: 10
angle_step_deg: 12.0

# 场景点本来就不多，参考点采样别太稀
scene_ref_sampling_rate: 5

# 位姿聚类阈值：20mm -> 0.02m
pos_thresh: 0.02
rot_thresh_deg: 20.0
registration_runs: 1
visualize: false
distance_step_ratio: 0.6

adaptive_downsample: true
adaptive_downsample_apply_to: both

adaptive_downsample_cfg:
  no_downsample_thresh: 450
  mid_thresh: 1500
  large_thresh: 3000
  target_mid: 500
  target_large: 450
  target_xlarge: 400
  search_steps: 12
  voxel_min: 1.0e-4
  voxel_max_scale: 0.20

rsmrq:
  L: 2
  T_tables: 4
  w_levels:
    - [0.20943951, 0.20943951, 0.20943951, 0.003]
    - [0.41887902, 0.41887902, 0.41887902, 0.006]
  merge_mode: count
  seed: 0

robust_vote:
  kernel: gaussian
  sigma: 0.6
  tau: 1.0
  B: 1.0
  top_m_per_bucket: 50
  normalize_feature: true

kde_refine:
  use_angle_embedding: true
  top_k: 3
  bandwidth_h: 0.35
  max_iter: 15
  tol: 1.0e-3
  refine_top_pose_k: 1

icp_refine:
  enable: false
  max_iter: 30
  distance_threshold: 0.005

bop_gt:
  t_scale: 1.0

pose_selection:
  enable: true
  pre_top_m_by_vote: 60
  candidate_top_k: 7
  refine_top_k: 3
  inlier_radius: 0.008
  max_correspondence_distance: 0.015
  residual_sigma: 0.006
  coverage_grid_size: 4
  normal_use_abs_dot: false
  keep_original_if_refine_worse: true
  weights:
    vote: 0.12
    inlier: 0.30
    coverage: 0.22
    normal: 0.12
    residual: 0.09
    visibility: 0.10
  visibility:
    enable: true
    radius: 0.008
    normal_dot_thresh: 0.10
    require_normal_agreement: true
    scene_normal_dot_thresh: 0.20
  candidate_veto:
    enable: true
    min_visibility_and_inlier_visibility: 0.12
    min_visibility_and_inlier_inlier: 0.22
    min_visibility_and_coverage_visibility: 0.10
    min_visibility_and_coverage_coverage: 0.30
    relative_visibility_ratio: 0.55
    relative_inlier_ratio: 0.60
    relative_coverage_ratio: 0.60
    min_keep_candidates: 3
  light_refine:
    enable: true
    max_iter: 5
    distance_threshold: 0.008

pose_clustering:
  enable: true
  pos_thresh: 0.02
  rot_thresh_deg: 18.0
  min_cluster_size: 1
  merge_by_score: true
  score_weights:
    size: 0.60
    mean: 0.25
    max: 0.15

output:
  root: experiments
  results_dir: experiments/results
  logs_dir: experiments/logs
  tables_dir: experiments/tables
  figures_dir: experiments/figures