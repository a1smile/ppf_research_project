# 组 2：Baseline + RS-MRQ
# 只启用前端匹配增强，用于验证 RS-MRQ 的独立收益。

seed: 0
sampling_leaf: 15.0
normal_k: 5
angle_step_deg: 12.0
scene_ref_sampling_rate: 20
pos_thresh: 0.005
rot_thresh_deg: 30.0
registration_runs: 1
visualize: false
distance_step_ratio: 0.6

adaptive_downsample: true
adaptive_downsample_apply_to: scene

adaptive_downsample_cfg:
  no_downsample_thresh: 450
  mid_thresh: 1500
  large_thresh: 3000
  target_mid: 500
  target_large: 450
  target_xlarge: 400
  search_steps: 12
  voxel_min: 1.0e-3
  voxel_max_scale: 0.20

enable_rsmrq: true
enable_robust_vote: false
enable_kde_refine: false

rsmrq:
  L: 2
  T_tables: 4
  w_levels:
    - [0.20943951, 0.20943951, 0.20943951, 3.0]
    - [0.41887902, 0.41887902, 0.41887902, 6.0]
  merge_mode: count
  seed: 0

robust_vote:
  kernel: gaussian
  sigma: 0.6
  tau: 1.0
  B: 1.0
  top_m_per_bucket: 50
  normalize_feature: true

kde_refine:
  use_angle_embedding: true
  top_k: 3
  bandwidth_h: 0.35
  max_iter: 15
  tol: 1.0e-3
  refine_top_pose_k: 1

icp_refine:
  enable: false
  max_iter: 30
  distance_threshold: 5.0

bop_gt:
  t_scale: 1.0

pose_selection:
  enable: false

pose_clustering:
  enable: false
  pos_thresh: 20.0
  rot_thresh_deg: 20.0
  min_cluster_size: 1
  merge_by_score: true
  score_weights:
    size: 0.60
    mean: 0.25
    max: 0.15

output:
  root: experiments
  results_dir: experiments/results
  logs_dir: experiments/logs
  tables_dir: experiments/tables
  figures_dir: experiments/figures
